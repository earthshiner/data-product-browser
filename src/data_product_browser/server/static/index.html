<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Data Product Browser</title>
  <style>
    :root {
      --bg: #0f1419; --panel: #1a2129; --panel-2: #222c36; --border: #2e3a46;
      --text: #e6edf3; --muted: #8b98a5; --accent: #4aa8ff; --accent-dim: #2d6da3;
      --pii: #ff7b72; --ok: #3fb950; --warn: #d29922;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
    }
    header {
      display: flex; align-items: center; gap: 16px; padding: 10px 18px;
      background: var(--panel); border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header select, header input {
      background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px; font-size: 13px;
    }
    .spacer { flex: 1; }
    .layout { display: flex; height: calc(100vh - 49px); }
    #tree {
      width: 320px; min-width: 320px; overflow-y: auto; padding: 12px;
      background: var(--panel); border-right: 1px solid var(--border);
    }
    #detail { flex: 1; overflow-y: auto; padding: 22px 28px; }
    .module-name {
      font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); margin: 14px 0 4px; font-weight: 600;
    }
    .entity {
      padding: 6px 10px; border-radius: 6px; cursor: pointer; color: var(--text);
      display: flex; justify-content: space-between; align-items: center;
    }
    .entity:hover { background: var(--panel-2); }
    .entity.active { background: var(--accent-dim); }
    .entity .count { color: var(--muted); font-size: 11px; }
    .banner {
      background: #3a2e16; border: 1px solid var(--warn); color: #f0d9a8;
      padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; white-space: pre-wrap;
      font-size: 12px;
    }
    .empty { color: var(--muted); padding: 40px; text-align: center; }
    h2 { margin: 0 0 4px; font-size: 22px; }
    .sub { color: var(--muted); margin: 0 0 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 8px; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    td.col-name { font-family: ui-monospace, Menlo, Consolas, monospace; color: var(--accent); }
    .tag {
      display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 10px;
      margin-left: 6px; font-weight: 600; vertical-align: middle;
    }
    .tag.pii { background: rgba(255,123,114,.15); color: var(--pii); border: 1px solid var(--pii); }
    .tag.req { background: rgba(63,185,80,.12); color: var(--ok); border: 1px solid var(--ok); }
    .desc { color: var(--muted); }
    .meta-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 18px; margin-bottom: 18px; }
    .meta-grid dt { color: var(--muted); }
    code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin: 4px 0 18px; }
    .tab {
      padding: 8px 14px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
      font-size: 13px; font-weight: 600;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab .badge {
      background: var(--panel-2); color: var(--muted); border-radius: 9px;
      padding: 0 6px; font-size: 10px; margin-left: 6px;
    }
    a.jump { color: var(--accent); cursor: pointer; text-decoration: none; }
    a.jump:hover { text-decoration: underline; }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 16px; margin-bottom: 10px;
    }
    .card h4 { margin: 0 0 4px; font-size: 14px; }
    .card .desc { margin: 4px 0 0; }
    .pill {
      display: inline-block; font-size: 10px; padding: 1px 8px; border-radius: 10px;
      border: 1px solid var(--border); color: var(--muted); margin-right: 6px;
    }
    .nav-special {
      padding: 8px 10px; border-radius: 6px; cursor: pointer; font-weight: 600;
      margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
    }
    .nav-special:hover { background: var(--panel-2); }
    .nav-special.active { background: var(--accent-dim); }
    .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 22px; }
    .stat {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
      border-left: 3px solid var(--muted);
    }
    .stat.ok { border-left-color: var(--ok); }
    .stat.bad { border-left-color: var(--pii); }
    .stat.warn { border-left-color: var(--warn); }
    .stat .big { font-size: 26px; font-weight: 700; }
    .stat .lbl { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .status-ok { color: var(--ok); font-weight: 600; }
    .status-bad { color: var(--pii); font-weight: 600; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .section-title { font-size: 15px; margin: 26px 0 8px; }
    /* Collapsible operations sections — Teradata brand accents */
    :root {
      --td-orange: #F36C21;  /* Teradata Orange */
      --td-blue:   #00B5E2;  /* Teradata Sky Blue */
      --td-navy:   #394C71;  /* Teradata Navy accent */
      --td-teal:   #00A7B5;  /* Teradata Teal */
    }
    details.ops-section {
      border: 1px solid var(--border); border-left-width: 4px; border-radius: 8px;
      background: var(--panel); margin: 14px 0; overflow: hidden;
    }
    details.ops-section > summary {
      cursor: pointer; list-style: none; padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
      font-size: 16px; font-weight: 700; color: var(--text);
      background: linear-gradient(90deg, var(--panel-2) 0%, var(--panel) 100%);
      user-select: none; text-transform: uppercase; letter-spacing: .04em;
    }
    details.ops-section > summary:hover { background: linear-gradient(90deg, #2a3744 0%, var(--panel-2) 100%); }
    details.ops-section > summary::-webkit-details-marker { display: none; }
    details.ops-section > summary::before {
      content: "▸"; color: var(--muted); font-size: 11px;
      transition: transform .15s ease; display: inline-block; width: 12px;
    }
    details.ops-section[open] > summary::before { transform: rotate(90deg); }
    details.ops-section > summary .count {
      margin-left: auto; color: var(--muted); font-size: 11px;
      text-transform: uppercase; letter-spacing: .04em; font-weight: 500;
    }
    details.ops-section > .ops-body { padding: 4px 16px 14px; }
    details.ops-section > .ops-body .section-title { display: none; }
    details.ops-section.ops-quality { border-left-color: var(--td-orange); }
    details.ops-section.ops-quality > summary { box-shadow: inset 4px 0 0 var(--td-orange); }
    details.ops-section.ops-lineage { border-left-color: var(--td-blue); }
    details.ops-section.ops-lineage > summary { box-shadow: inset 4px 0 0 var(--td-blue); }
    details.ops-section.ops-change  { border-left-color: var(--td-navy); }
    details.ops-section.ops-change  > summary { box-shadow: inset 4px 0 0 var(--td-navy); }
    details.ops-section.ops-agent   { border-left-color: var(--td-teal); }
    details.ops-section.ops-agent   > summary { box-shadow: inset 4px 0 0 var(--td-teal); }
    .charts-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 8px; }
    .chart-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
    .chart-title { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
    .chart-caption { color: var(--muted); font-size: 11px; margin-top: 6px; }
    svg.chart { width: 100%; height: 56px; display: block; }
    .pill-row { margin: 4px 0 10px; }
    .pill.ok { color: var(--ok); border-color: var(--ok); }
    .pill.bad { color: var(--pii); border-color: var(--pii); }
    .erd-scroll { overflow: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); }
    svg.erd { display: block; }
    .erd-node { cursor: pointer; }
    .erd-node:hover rect { filter: brightness(1.25); }
    .erd-label { fill: var(--text); font-size: 13px; font-weight: 600; }
    .erd-sub { fill: var(--muted); font-size: 10px; font-family: ui-monospace, Menlo, Consolas, monospace; }
    .erd-head { fill: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .erd-edge { fill: none; stroke: var(--muted); stroke-width: 1.3; opacity: .55; }
    .erd-legend { fill: var(--muted); font-size: 11px; }
    .cookbook-search { width: 100%; max-width: 420px; margin-bottom: 16px; background: var(--panel-2);
      color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 13px; }
    .recipe {
      background: linear-gradient(180deg, #1f2a36 0%, var(--panel) 100%);
      border: 1px solid var(--border); border-left: 4px solid var(--td-orange);
      border-radius: 10px; padding: 18px 20px; margin-bottom: 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.25);
    }
    .recipe.is-batch { border-left-color: var(--td-blue); }
    .recipe h4 {
      margin: 0 0 10px; font-size: 20px; font-weight: 700;
      color: #ffd9b3; letter-spacing: .01em;
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    }
    .recipe h4 .pill { font-size: 12px; padding: 4px 12px; border-radius: 14px;
      border-width: 1.5px; margin: 0; }
    .recipe .business-q {
      font-size: 14.5px; color: var(--text); margin: 0 0 8px; line-height: 1.55;
    }
    .recipe .use-case {
      font-size: 14px; color: #e6edf3; margin: 0 0 10px;
    }
    .recipe .use-case strong { color: var(--td-teal); font-weight: 700; }
    .recipe .params-note { font-size: 12.5px; color: var(--muted); margin-top: 8px; }
    .recipe .params-note strong { color: var(--td-orange); font-weight: 700; }
    .recipe .perf-note { font-size: 12.5px; color: #f0d9a8; margin-top: 6px; }
    .pill.mode-interactive {
      background: linear-gradient(135deg, #00B5E2 0%, #0090b8 100%);
      color: #051018; border-color: #00B5E2; font-weight: 800;
      text-transform: uppercase; letter-spacing: .05em;
      box-shadow: 0 0 0 1px rgba(0,181,226,.4), 0 1px 4px rgba(0,181,226,.25);
    }
    .pill.mode-batch {
      background: linear-gradient(135deg, #F36C21 0%, #c4541a 100%);
      color: #1a0d04; border-color: #F36C21; font-weight: 800;
      text-transform: uppercase; letter-spacing: .05em;
      box-shadow: 0 0 0 1px rgba(243,108,33,.4), 0 1px 4px rgba(243,108,33,.25);
    }
    /* Complexity / module pills (the ones inside the recipe header) — give them colour too */
    .recipe h4 .pill.ok {
      background: rgba(63,185,80,.22); color: #6fdc81;
      border-color: #3fb950; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    }
    .recipe h4 .pill.bad {
      background: rgba(255,123,114,.22); color: #ffa39a;
      border-color: #ff7b72; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    }
    .recipe h4 .pill:not(.ok):not(.bad):not(.mode-interactive):not(.mode-batch) {
      background: rgba(74,168,255,.18); color: #8dc7ff;
      border-color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    }
    .cookbook-toolbar {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px;
    }
    .mode-filter { display: inline-flex; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .mode-filter button {
      background: var(--panel-2); color: var(--muted); border: 0; padding: 7px 14px;
      font-size: 12px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: .04em;
    }
    .mode-filter button:hover { color: var(--text); }
    .mode-filter button.active { background: var(--td-orange); color: #1a1a1a; }
    .code-head { display: flex; justify-content: space-between; align-items: center; margin: 10px 0 0; }
    .recipe-id { color: var(--muted); font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; }
    .copy-btn { background: var(--panel-2); color: var(--accent); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
    .copy-btn:hover:not(:disabled) { border-color: var(--accent); }
    .copy-btn:disabled { color: var(--ok); border-color: var(--ok); cursor: default; }
    pre.sql { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px;
      overflow-x: auto; margin: 6px 0 10px; }
    pre.sql code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px; line-height: 1.5; white-space: pre; }
    .sql-keyword { color: #79c0ff; font-weight: 600; }
    .sql-string { color: #a5d6ff; }
    .sql-number { color: #f0883e; }
    .sql-comment { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <header>
    <h1>🗂 Data Product Browser</h1>
    <select id="product-select"><option value="">Loading…</option></select>
    <input id="filter" type="search" placeholder="Filter entities…" />
    <div class="spacer"></div>
    <span id="status" class="sub" style="margin:0"></span>
  </header>
  <div class="layout">
    <nav id="tree"></nav>
    <main id="detail"><div class="empty">Select a data product to begin.</div></main>
  </div>
  <script src="/app.js?v=3"></script>
</body>
</html>
