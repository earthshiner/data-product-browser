<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Data Product Browser</title>
  <style>
    :root {
      --bg: #0f1419; --panel: #1a2129; --panel-2: #222c36; --border: #2e3a46;
      --text: #e6edf3; --muted: #8b98a5; --accent: #4aa8ff; --accent-dim: #2d6da3;
      --pii: #ff7b72; --ok: #3fb950; --warn: #d29922;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
    }
    header {
      display: flex; align-items: center; gap: 16px; padding: 10px 18px;
      background: var(--panel); border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header select, header input {
      background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px; font-size: 13px;
    }
    .spacer { flex: 1; }
    .layout { display: flex; height: calc(100vh - 49px); }
    #tree {
      width: 320px; min-width: 320px; overflow-y: auto; padding: 12px;
      background: var(--panel); border-right: 1px solid var(--border);
    }
    #detail { flex: 1; overflow-y: auto; padding: 22px 28px; }
    .module-name {
      font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); margin: 14px 0 4px; font-weight: 600;
    }
    .entity {
      padding: 6px 10px; border-radius: 6px; cursor: pointer; color: var(--text);
      display: flex; justify-content: space-between; align-items: center;
    }
    .entity:hover { background: var(--panel-2); }
    .entity.active { background: var(--accent-dim); }
    .entity .count { color: var(--muted); font-size: 11px; }
    .banner {
      background: #3a2e16; border: 1px solid var(--warn); color: #f0d9a8;
      padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; white-space: pre-wrap;
      font-size: 12px;
    }
    .empty { color: var(--muted); padding: 40px; text-align: center; }
    h2 { margin: 0 0 4px; font-size: 22px; }
    .sub { color: var(--muted); margin: 0 0 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 8px; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    td.col-name { font-family: ui-monospace, Menlo, Consolas, monospace; color: var(--accent); }
    .tag {
      display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 10px;
      margin-left: 6px; font-weight: 600; vertical-align: middle;
    }
    .tag.pii { background: rgba(255,123,114,.15); color: var(--pii); border: 1px solid var(--pii); }
    .tag.req { background: rgba(63,185,80,.12); color: var(--ok); border: 1px solid var(--ok); }
    .tag.pk { background: rgba(243,108,33,.14); color: var(--td-orange); border: 1px solid var(--td-orange); }
    .tag.nk { background: rgba(0,167,181,.14); color: var(--td-teal); border: 1px solid var(--td-teal); }
    .tag.fk { background: rgba(74,168,255,.14); color: var(--accent); border: 1px solid var(--accent); }
    .tag.sens { background: var(--pii); color: #1d0a08; border: 1px solid var(--pii); }
    .tag.nn { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .fk-ref { margin-top: 3px; font-size: 11px; color: var(--muted); font-family: ui-monospace, Menlo, Consolas, monospace; }
    .fk-ref code { color: var(--accent); background: none; padding: 0; }
    .desc { color: var(--muted); }
    .meta-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 18px; margin-bottom: 18px; }
    .meta-grid dt { color: var(--muted); }
    code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
    .tabs {
      display: flex; gap: 2px; margin: 8px 0 20px;
      background: linear-gradient(135deg, #1f2a36 0%, #182028 100%);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.25);
    }
    .tab {
      padding: 9px 16px; cursor: pointer; color: var(--muted); border-radius: 7px;
      font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
      transition: background .15s ease, color .15s ease;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,.04); }
    .tab.active {
      color: #051018;
      background: linear-gradient(135deg, #00B5E2 0%, #0090b8 100%);
      box-shadow: 0 0 0 1px rgba(0,181,226,.4), 0 1px 4px rgba(0,181,226,.25);
    }
    .tab.active .badge { background: rgba(5,16,24,.25); color: #051018; }
    .tab .badge {
      background: var(--panel); color: var(--text); border-radius: 10px;
      padding: 1px 8px; font-size: 11px; font-weight: 700; margin-left: 8px;
      border: 1px solid var(--border);
    }
    a.jump { color: var(--accent); cursor: pointer; text-decoration: none; }
    a.jump:hover { text-decoration: underline; }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 16px; margin-bottom: 10px;
    }
    .card h4 { margin: 0 0 4px; font-size: 14px; }
    .card .desc { margin: 4px 0 0; }
    .pill {
      display: inline-block; font-size: 10px; padding: 1px 8px; border-radius: 10px;
      border: 1px solid var(--border); color: var(--muted); margin-right: 6px;
    }
    .nav-special {
      padding: 8px 10px; border-radius: 6px; cursor: pointer; font-weight: 600;
      margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
    }
    .nav-special:hover { background: var(--panel-2); }
    .nav-special.active { background: var(--accent-dim); }
    .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 22px; }
    .stat {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
      border-left: 3px solid var(--muted);
    }
    .stat.ok { border-left-color: var(--ok); }
    .stat.bad { border-left-color: var(--pii); }
    .stat.warn { border-left-color: var(--warn); }
    .stat .big { font-size: 26px; font-weight: 700; }
    .stat .lbl { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .status-ok { color: var(--ok); font-weight: 600; }
    .status-bad { color: var(--pii); font-weight: 600; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .section-title { font-size: 15px; margin: 26px 0 8px; }
    /* Collapsible operations sections — Teradata brand accents */
    :root {
      --td-orange: #F36C21;  /* Teradata Orange */
      --td-blue:   #00B5E2;  /* Teradata Sky Blue */
      --td-navy:   #394C71;  /* Teradata Navy accent */
      --td-teal:   #00A7B5;  /* Teradata Teal */
    }
    details.ops-section {
      border: 1px solid var(--border); border-left-width: 4px; border-radius: 8px;
      background: var(--panel); margin: 14px 0; overflow: hidden;
    }
    details.ops-section > summary {
      cursor: pointer; list-style: none; padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
      font-size: 16px; font-weight: 700; color: var(--text);
      background: linear-gradient(90deg, var(--panel-2) 0%, var(--panel) 100%);
      user-select: none; text-transform: uppercase; letter-spacing: .04em;
    }
    details.ops-section > summary:hover { background: linear-gradient(90deg, #2a3744 0%, var(--panel-2) 100%); }
    details.ops-section > summary::-webkit-details-marker { display: none; }
    details.ops-section > summary::before {
      content: "▸"; color: var(--muted); font-size: 11px;
      transition: transform .15s ease; display: inline-block; width: 12px;
    }
    details.ops-section[open] > summary::before { transform: rotate(90deg); }
    details.ops-section > summary .count {
      margin-left: auto; color: var(--muted); font-size: 11px;
      text-transform: uppercase; letter-spacing: .04em; font-weight: 500;
    }
    details.ops-section > .ops-body { padding: 4px 16px 14px; }
    details.ops-section > .ops-body .section-title { display: none; }
    details.ops-section.ops-quality { border-left-color: var(--td-orange); }
    details.ops-section.ops-quality > summary { box-shadow: inset 4px 0 0 var(--td-orange); }
    details.ops-section.ops-lineage { border-left-color: var(--td-blue); }
    details.ops-section.ops-lineage > summary { box-shadow: inset 4px 0 0 var(--td-blue); }
    details.ops-section.ops-change  { border-left-color: var(--td-navy); }
    details.ops-section.ops-change  > summary { box-shadow: inset 4px 0 0 var(--td-navy); }
    details.ops-section.ops-agent   { border-left-color: var(--td-teal); }
    details.ops-section.ops-agent   > summary { box-shadow: inset 4px 0 0 var(--td-teal); }

    /* Trust engine banner — prominent and colour-coded by status */
    .trust-banner {
      border-radius: 12px; padding: 18px 22px; margin: 18px 0 22px;
      border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .trust-banner.trust-untrusted {
      background: linear-gradient(135deg, #5a1e1e 0%, #3a1414 100%);
      border-color: #ff7b72; box-shadow: 0 0 0 1px rgba(255,123,114,.35), 0 4px 16px rgba(255,123,114,.18);
    }
    .trust-banner.trust-trusted {
      background: linear-gradient(135deg, #1f4a2a 0%, #143420 100%);
      border-color: #7ee08d; box-shadow: 0 0 0 1px rgba(126,224,141,.35), 0 4px 16px rgba(126,224,141,.18);
    }
    .trust-banner-head {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .trust-banner-title {
      font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: .01em;
    }
    .trust-status-badge {
      font-size: 16px; font-weight: 800; padding: 6px 16px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .08em;
    }
    .trust-untrusted .trust-status-badge {
      background: #ff7b72; color: #1a0303; box-shadow: 0 0 12px rgba(255,123,114,.6);
    }
    .trust-trusted .trust-status-badge {
      background: #b6f0a8; color: #0a2412; box-shadow: 0 0 12px rgba(126,224,141,.55);
    }
    .trust-agent {
      font-size: 13px; font-weight: 700; padding: 5px 12px; border-radius: 14px;
      border: 1.5px solid; margin-left: auto;
    }
    .trust-agent.ok { color: #b6f0a8; border-color: #7ee08d; background: rgba(126,224,141,.12); }
    .trust-agent.bad { color: #ffd0cc; border-color: #ff7b72; background: rgba(255,123,114,.18); }
    .trust-banner-checks { font-size: 15px; color: var(--text); margin: 0 0 12px; opacity: .9; }
    .trust-banner-checks .bad-num { color: #ffa39a; font-weight: 700; }
    .trust-banner-checks .crit-num { color: #ff6b60; font-weight: 800; text-transform: uppercase; }
    .trust-scores { display: flex; flex-wrap: wrap; gap: 10px; }
    .trust-score {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px; padding: 6px 14px; font-size: 13px; font-weight: 600; color: var(--text);
    }
    .trust-score strong { font-size: 15px; margin-left: 4px; }
    .trust-trusted .trust-score { background: rgba(126,224,141,.12); border-color: rgba(126,224,141,.3); }
    .trust-untrusted .trust-score { background: rgba(255,123,114,.1); border-color: rgba(255,123,114,.25); }

    /* Schema-tab diagnostic for missing column_metadata */
    .diagnostic {
      background: rgba(210,153,34,.1); border: 1px solid rgba(210,153,34,.35);
      border-left: 4px solid var(--warn); border-radius: 8px;
      padding: 12px 16px; margin: 0 0 14px; font-size: 13px; color: var(--text);
    }
    .diagnostic strong { color: #f0c674; display: block; margin-bottom: 6px; }
    .diagnostic code { color: var(--accent); }
    .diagnostic ul { margin: 6px 0 0; padding-left: 22px; }
    .diagnostic li { margin: 2px 0; }
    .charts-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 8px; }
    .chart-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
    .chart-title { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
    .chart-caption { color: var(--muted); font-size: 11px; margin-top: 6px; }
    svg.chart { width: 100%; height: 56px; display: block; }
    .pill-row { margin: 4px 0 10px; }
    .pill.ok { color: var(--ok); border-color: var(--ok); }
    .pill.bad { color: var(--pii); border-color: var(--pii); }
    .erd-scroll {
      /* Horizontal scrollbar is always visible (affordance — small diagrams
         won't trigger overflow on a wide window, but the user still wants to
         see the control). Vertical appears on demand. */
      overflow-x: scroll; overflow-y: auto;
      border: 1px solid var(--border); border-radius: 10px;
      background: var(--bg);
      /* Cap height so the horizontal scrollbar stays in the viewport instead
         of sitting at the bottom of a tall SVG (which would force the user to
         scroll the page first). */
      max-height: calc(100vh - 220px);
      scrollbar-color: var(--border) transparent;
      scrollbar-width: auto;
    }
    .erd-scroll::-webkit-scrollbar { width: 12px; height: 12px; }
    .erd-scroll::-webkit-scrollbar-track { background: var(--panel-2); border-radius: 6px; }
    .erd-scroll::-webkit-scrollbar-thumb {
      background: var(--border); border-radius: 6px; border: 2px solid var(--panel-2);
    }
    .erd-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    .erd-scroll::-webkit-scrollbar-corner { background: var(--panel-2); }
    svg.erd { display: block; }
    .erd-toolbar { display: flex; align-items: center; gap: 12px; margin: 0 0 10px; }
    .erd-btn { background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .erd-btn:hover { border-color: var(--accent); }
    .erd-toolhint { color: var(--muted); font-size: 12px; }
    .erd-toggle { cursor: pointer; }
    .erd-toggle-bg { fill: var(--bg); stroke: var(--border); stroke-width: 1; }
    .erd-toggle:hover .erd-toggle-bg { stroke: var(--accent); }
    .erd-toggle-t { fill: var(--muted); font-size: 14px; font-weight: 700; }
    .erd-toggle:hover .erd-toggle-t { fill: var(--accent); }
    .erd-head { fill: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .erd-legend { fill: var(--muted); font-size: 11px; }
    /* attribute-level boxes */
    .erd-box { cursor: pointer; }
    .erd-box-bg { fill: var(--panel-2); stroke: var(--border); stroke-width: 1.3; }
    .erd-box-name { fill: var(--text); font-size: 12.5px; font-weight: 700; }
    .erd-box-sub { fill: var(--muted); font-size: 9.5px; font-family: ui-monospace, Menlo, Consolas, monospace; }
    .erd-cn { fill: var(--text); font-size: 11.5px; }
    .erd-cn.fk { fill: var(--accent); }
    .erd-ct { fill: var(--muted); font-size: 9.5px; font-family: ui-monospace, Menlo, Consolas, monospace; }
    .erd-rowline { stroke: var(--border); stroke-width: 1; opacity: .5; }
    /* edges */
    .erd-edge { fill: none; stroke-width: 2; }
    .erd-edge.hard { stroke: var(--td-orange); }
    .erd-edge.soft { stroke: var(--accent); stroke-dasharray: 7 5; }
    .erd-edge.erd-on { stroke-width: 3.2; }
    .erd-dot.hard { fill: var(--td-orange); }
    .erd-dot.soft { fill: var(--accent); }
    .erd-glyph { fill: none; stroke-width: 1.6; stroke-linecap: round; }
    .erd-glyph.hard { stroke: var(--td-orange); }
    .erd-glyph.soft { stroke: var(--accent); }
    .erd-glyph-bg { fill: var(--bg); stroke-width: 1.6; }
    .erd-glyph-bg.hard { stroke: var(--td-orange); }
    .erd-glyph-bg.soft { stroke: var(--accent); }
    .erd-card-g { pointer-events: all; }
    .erd-card-bg { fill: var(--bg); opacity: .82; }
    .erd-card { fill: var(--text); font-size: 9.5px; font-weight: 600; }
    .erd-dimmed { opacity: .12; transition: opacity .12s; }
    /* attribute badges */
    .erd-badge-t { font-size: 8.5px; font-weight: 700; }
    .erd-bg-pk { fill: var(--td-orange); }   .erd-tx-pk { fill: #1a1208; }
    .erd-bg-fk { fill: var(--accent); }      .erd-tx-fk { fill: #0a141d; }
    .erd-bg-pii { fill: var(--pii); }        .erd-tx-pii { fill: #1d0a08; }
    .erd-ol-nk { fill: none; stroke: var(--accent); stroke-width: 1; }   .erd-tx-nk { fill: var(--accent); }
    .erd-ol-sens { fill: none; stroke: var(--pii); stroke-width: 1; }    .erd-tx-sens { fill: var(--pii); }
    .erd-ol-nn { fill: none; stroke: var(--border); stroke-width: 1; }   .erd-tx-nn { fill: var(--muted); }
    .cookbook-search { width: 100%; max-width: 420px; margin-bottom: 16px; background: var(--panel-2);
      color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 13px; }
    details.recipe {
      background: linear-gradient(180deg, #1f2a36 0%, var(--panel) 100%);
      border: 1px solid var(--border); border-left: 4px solid var(--td-orange);
      border-radius: 10px; margin-bottom: 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.25); overflow: hidden;
    }
    details.recipe.is-batch { border-left-color: var(--td-blue); }
    details.recipe > summary {
      cursor: pointer; list-style: none; padding: 16px 20px;
      display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
      user-select: none;
    }
    details.recipe > summary::-webkit-details-marker { display: none; }
    details.recipe > summary::before {
      content: "▸"; color: var(--muted); font-size: 13px;
      transition: transform .15s ease; display: inline-block; width: 14px; flex-shrink: 0;
    }
    details.recipe[open] > summary::before { transform: rotate(90deg); color: var(--td-orange); }
    details.recipe.is-batch[open] > summary::before { color: var(--td-blue); }
    details.recipe > summary:hover { background: rgba(255,255,255,.02); }
    details.recipe > summary .recipe-title {
      font-size: 20px; font-weight: 700; color: #ffd9b3; letter-spacing: .01em;
      flex: 1 1 auto; min-width: 200px;
    }
    details.recipe > summary .pill {
      font-size: 12px; padding: 4px 12px; border-radius: 14px;
      border-width: 1.5px; margin: 0;
    }
    details.recipe > .recipe-body { padding: 0 20px 18px; }
    .cookbook-tools { display: inline-flex; gap: 6px; margin-left: auto; }
    .cookbook-tools button {
      background: var(--panel-2); color: var(--muted); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .cookbook-tools button:hover { color: var(--text); border-color: var(--accent); }
    .recipe .business-q {
      font-size: 14.5px; color: var(--text); margin: 0 0 8px; line-height: 1.55;
    }
    .recipe .use-case {
      font-size: 14px; color: #e6edf3; margin: 0 0 10px;
    }
    .recipe .use-case strong { color: var(--td-teal); font-weight: 700; }
    .recipe .params-note { font-size: 12.5px; color: var(--muted); margin-top: 8px; }
    .recipe .params-note strong { color: var(--td-orange); font-weight: 700; }
    .recipe .perf-note { font-size: 12.5px; color: #f0d9a8; margin-top: 6px; }
    .pill.mode-interactive {
      background: linear-gradient(135deg, #00B5E2 0%, #0090b8 100%);
      color: #051018; border-color: #00B5E2; font-weight: 800;
      text-transform: uppercase; letter-spacing: .05em;
      box-shadow: 0 0 0 1px rgba(0,181,226,.4), 0 1px 4px rgba(0,181,226,.25);
    }
    .pill.mode-batch {
      background: linear-gradient(135deg, #F36C21 0%, #c4541a 100%);
      color: #1a0d04; border-color: #F36C21; font-weight: 800;
      text-transform: uppercase; letter-spacing: .05em;
      box-shadow: 0 0 0 1px rgba(243,108,33,.4), 0 1px 4px rgba(243,108,33,.25);
    }
    /* Complexity + module pills in the recipe header — strong, distinct colours */
    details.recipe > summary .pill { text-transform: uppercase; letter-spacing: .04em; font-weight: 700; }
    details.recipe > summary .pill.ok {
      background: rgba(63,185,80,.25); color: #7ee08d; border-color: #3fb950;
    }
    details.recipe > summary .pill.warn {
      background: rgba(210,153,34,.25); color: #f0c674; border-color: #d29922;
    }
    details.recipe > summary .pill.bad {
      background: rgba(255,123,114,.25); color: #ffa39a; border-color: #ff7b72;
    }
    /* Module palette — deterministic per module name (see modulePillClass in app.js) */
    details.recipe > summary .pill.mod-purple {
      background: rgba(163,113,247,.22); color: #c8a8ff; border-color: #a371f7;
    }
    details.recipe > summary .pill.mod-teal {
      background: rgba(0,167,181,.25); color: #5fd9e3; border-color: var(--td-teal);
    }
    details.recipe > summary .pill.mod-amber {
      background: rgba(243,108,33,.22); color: #ffae7a; border-color: var(--td-orange);
    }
    details.recipe > summary .pill.mod-pink {
      background: rgba(247,99,159,.22); color: #ffa6c6; border-color: #f7639f;
    }
    details.recipe > summary .pill.mod-lime {
